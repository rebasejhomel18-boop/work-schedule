<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0f1e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Work Schedule">
<title>Work Schedule</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<!-- Inline manifest so the whole app stays a single file -->
<link rel="manifest" href='data:application/manifest+json,{"name":"Work Schedule","short_name":"Schedule","display":"standalone","background_color":"%230a0f1e","theme_color":"%230a0f1e","start_url":".","icons":[{"src":"data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 192 192%22%3E%3Crect width=%22192%22 height=%22192%22 rx=%2240%22 fill=%22%230a0f1e%22/%3E%3Crect x=%2230%22 y=%2256%22 width=%2250%22 height=%2250%22 rx=%2210%22 fill=%22%232563EB%22/%3E%3Crect x=%22112%22 y=%2256%22 width=%2250%22 height=%2250%22 rx=%2210%22 fill=%22%23DC2626%22/%3E%3Crect x=%2230%22 y=%22120%22 width=%2250%22 height=%2250%22 rx=%2210%22 fill=%22%2316A34A%22/%3E%3Crect x=%22112%22 y=%22120%22 width=%2250%22 height=%2250%22 rx=%2210%22 fill=%22%23334155%22/%3E%3C/svg%3E","sizes":"192x192","type":"image/svg+xml"}]}'>
<style>
  :root{
    --bg:#0a0f1e;--panel:#0f1729;--panel-2:#131c33;--line:#1e2a45;
    --text:#e7ecf6;--muted:#8294b5;--faint:#5a6a8a;
    --duty:#2563EB;--ot:#DC2626;--bupan:#16A34A;--rest:#334155;
    --salary:#D4AF37;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(37,99,235,.10), transparent 60%),
      radial-gradient(900px 500px at -10% 10%, rgba(212,175,55,.06), transparent 55%),
      var(--bg);
    color:var(--text);font-family:'Inter',system-ui,sans-serif;line-height:1.45;
    min-height:100vh;padding:env(safe-area-inset-top) 0 calc(env(safe-area-inset-bottom) + 90px);
  }
  .wrap{max-width:680px;margin:0 auto;padding:14px}

  header{
    border:1px solid var(--line);border-radius:18px;
    background:linear-gradient(180deg,var(--panel-2),var(--panel));
    padding:18px 18px 16px;margin-bottom:16px;
  }
  h1{font-size:22px;font-weight:800;letter-spacing:-.4px}
  .sub{color:var(--muted);margin-top:5px;font-size:13px}
  .sub b{color:var(--text);font-weight:600}
  .legend{display:flex;flex-wrap:wrap;gap:6px 14px;margin-top:14px;padding-top:13px;border-top:1px solid var(--line)}
  .lg{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted)}
  .sw{width:14px;height:14px;border-radius:4px;flex-shrink:0}
  .sw.duty{background:var(--duty)}.sw.ot{background:var(--ot)}
  .sw.bupan{background:var(--bupan)}.sw.rest{background:var(--rest);border:1px solid #44557a}
  .sw.salary{background:transparent;border:2px solid var(--salary);box-shadow:0 0 7px rgba(212,175,55,.5)}
  .sw.today{background:transparent;border:2px solid #fff}

  .cutbox{
    border:2px solid var(--cut,#818cf8);border-radius:16px;background:var(--panel);
    overflow:hidden;margin-bottom:16px;
  }
  .cb-head{padding:13px 16px;border-bottom:1px solid var(--line);background:linear-gradient(90deg,color-mix(in srgb,var(--cut) 16%,transparent),transparent)}
  .cb-title{font-size:15px;font-weight:700;display:flex;align-items:center;gap:9px}
  .cb-title .dot{width:10px;height:10px;border-radius:50%;background:var(--cut);flex-shrink:0}
  .cb-range{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--muted);margin-top:4px;margin-left:19px}
  .cb-body{padding:12px 12px 6px}

  .dow{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:6px}
  .dow span{text-align:center;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--faint)}
  .days{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
  .cell{
    aspect-ratio:1/1;border-radius:9px;position:relative;
    display:flex;align-items:center;justify-content:center;
    font-size:14px;font-weight:600;color:#fff;border:1px solid transparent;cursor:pointer;
    transition:transform .08s ease;
  }
  .cell:active{transform:scale(.9)}
  .cell.empty{background:transparent;pointer-events:none}
  .mdiv{grid-column:1/-1;font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:1px;text-transform:uppercase;color:var(--faint);margin:8px 0 2px;padding-left:2px;display:flex;align-items:center;gap:8px}
  .mdiv::after{content:"";flex:1;height:1px;background:var(--line)}

  .t-duty{background:var(--duty)}.t-ot{background:var(--ot)}
  .t-bupan{background:var(--bupan)}.t-rest{background:var(--rest);color:#c7d2e6}
  .is-salary{border-color:var(--salary)!important;box-shadow:0 0 0 1px var(--salary),0 0 8px rgba(212,175,55,.5)}
  .is-salary::after{content:"💵";position:absolute;top:-2px;right:-1px;font-size:11px;line-height:1;text-shadow:0 0 3px rgba(0,0,0,.7)}
  .is-today{border-color:#fff!important;box-shadow:0 0 0 2px #fff,0 0 10px rgba(255,255,255,.5)}
  .is-today.is-salary{box-shadow:0 0 0 2px #fff,0 0 0 4px var(--salary),0 0 10px rgba(255,255,255,.5)}
  .is-edited::before{content:"";position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:#fff;opacity:.7}

  .cb-foot{padding:10px 16px 13px;border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
  .stat{text-align:center}
  .stat .v{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;line-height:1}
  .stat .kk{font-size:8.5px;letter-spacing:.4px;text-transform:uppercase;color:var(--faint);margin-top:3px}
  .stat.duty .v{color:#5b8cff}.stat.ot .v{color:#ff6b6b}.stat.bupan .v{color:#3ad07a}.stat.rest .v{color:#9fb0cf}

  /* bottom action bar */
  .bar{
    position:fixed;left:0;right:0;bottom:0;z-index:40;
    background:rgba(15,23,41,.92);backdrop-filter:blur(12px);
    border-top:1px solid var(--line);
    padding:12px 14px calc(12px + env(safe-area-inset-bottom));
    display:flex;gap:10px;max-width:680px;margin:0 auto;
  }
  .btn{
    flex:1;border:none;border-radius:12px;padding:13px;font-family:'Inter',sans-serif;
    font-size:14px;font-weight:700;cursor:pointer;color:#fff;
  }
  .btn.primary{background:var(--duty)}
  .btn.ghost{background:var(--panel-2);border:1px solid var(--line);color:var(--text)}
  .btn:active{filter:brightness(.9)}

  /* day-edit sheet */
  .overlay{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.55);display:none;align-items:flex-end}
  .overlay.open{display:flex}
  .sheet{
    width:100%;max-width:680px;margin:0 auto;background:var(--panel);
    border-radius:20px 20px 0 0;border:1px solid var(--line);border-bottom:none;
    padding:18px 16px calc(18px + env(safe-area-inset-bottom));
    transform:translateY(100%);transition:transform .22s ease;
  }
  .overlay.open .sheet{transform:translateY(0)}
  .sheet h3{font-size:16px;font-weight:700;margin-bottom:3px}
  .sheet .meta{font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-bottom:14px}
  .opts{display:grid;grid-template-columns:1fr 1fr;gap:9px}
  .opt{
    border:1px solid var(--line);border-radius:12px;padding:13px;cursor:pointer;
    display:flex;align-items:center;gap:10px;font-size:14px;font-weight:600;background:var(--panel-2);color:var(--text);
  }
  .opt .chip{width:18px;height:18px;border-radius:5px;flex-shrink:0}
  .opt.sel{outline:2px solid #fff;outline-offset:1px}
  .opt .c-duty{background:var(--duty)}.opt .c-ot{background:var(--ot)}
  .opt .c-bupan{background:var(--bupan)}.opt .c-rest{background:var(--rest);border:1px solid #44557a}
  .opt.reset{grid-column:1/-1;justify-content:center;background:transparent;color:var(--muted);font-weight:600;font-size:13px}
  .toast{
    position:fixed;bottom:96px;left:50%;transform:translateX(-50%) translateY(20px);
    background:#1a2540;border:1px solid var(--line);color:var(--text);
    padding:11px 18px;border-radius:12px;font-size:13px;font-weight:600;
    opacity:0;pointer-events:none;transition:all .25s ease;z-index:60;white-space:nowrap;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  footer.note{color:var(--faint);font-size:11px;text-align:center;font-family:'JetBrains Mono',monospace;padding:4px 0 8px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Work Schedule</h1>
    <p class="sub">2-2 rotation · tap any day to set <b>Duty / OT / Bupan / Rest</b>. Saved on this device.</p>
    <div class="legend">
      <div class="lg"><span class="sw duty"></span>Duty</div>
      <div class="lg"><span class="sw ot"></span>OT</div>
      <div class="lg"><span class="sw bupan"></span>Bupan</div>
      <div class="lg"><span class="sw rest"></span>Rest</div>
      <div class="lg"><span class="sw salary"></span>Salary 💵</div>
      <div class="lg"><span class="sw today"></span>Today</div>
    </div>
  </header>
  <div id="cutWrap"></div>
  <footer class="note">A white dot = day you changed manually</footer>
</div>

<div class="bar">
  <button class="btn primary" id="exportBtn">📅 Export to Google Calendar</button>
  <button class="btn ghost" id="todayBtn">Today</button>
</div>

<div class="overlay" id="overlay">
  <div class="sheet">
    <h3 id="sheetTitle">Set day type</h3>
    <div class="meta" id="sheetMeta"></div>
    <div class="opts">
      <div class="opt" data-set="duty"><span class="chip c-duty"></span>Duty</div>
      <div class="opt" data-set="ot"><span class="chip c-ot"></span>OT</div>
      <div class="opt" data-set="bupan"><span class="chip c-bupan"></span>Bupan</div>
      <div class="opt" data-set="rest"><span class="chip c-rest"></span>Rest</div>
      <div class="opt reset" data-set="auto">↺ Reset to auto-rotation</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============ CONFIG ============ */
const ANCHOR=new Date(2026,5,17);
const MS_DAY=86400000;
const OT_DATES={ 6:[18,22], 7:[8,12,16,24] };       // built-in defaults
const BUPAN_DATES={ 6:[25],7:[19],8:[16],9:[14],10:[24],11:[20],12:[6] };
const MNAME=['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MFULL=['','January','February','March','April','May','June','July','August','September','October','November','December'];
const DOW=['Su','Mo','Tu','We','Th','Fr','Sa'];
const CUTOFF_COLORS=['#e879f9','#22d3ee','#f97316','#a3e635','#fb7185','#818cf8','#fbbf24','#34d399'];
const CUTOFFS=[6,7,8,9,10,11,12];
const STORE_KEY='workschedule_overrides_v1';

function cutoffColor(m){return CUTOFF_COLORS[(((m-6)%CUTOFF_COLORS.length)+CUTOFF_COLORS.length)%CUTOFF_COLORS.length];}

/* ============ STORAGE (user overrides) ============ */
let overrides = {};   // { "2026-06-30": "ot", ... }
try{ overrides = JSON.parse(localStorage.getItem(STORE_KEY)) || {}; }catch(e){ overrides={}; }
function saveOverrides(){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(overrides)); }catch(e){} }
function keyOf(y,mo,da){ return `${y}-${String(mo).padStart(2,'0')}-${String(da).padStart(2,'0')}`; }

/* ============ LOGIC ============ */
function dayOffset(d){return Math.round((d-ANCHOR)/MS_DAY);}
function baseType(d){let m=((dayOffset(d)%4)+4)%4;return(m===0||m===1)?'rest':'duty';}
function autoType(y,mo,da){
  if((BUPAN_DATES[mo]||[]).includes(da))return'bupan';
  if((OT_DATES[mo]||[]).includes(da))return'ot';
  return baseType(new Date(y,mo-1,da));
}
function dayType(y,mo,da){
  const k=keyOf(y,mo,da);
  if(overrides[k]) return overrides[k];     // user override wins
  return autoType(y,mo,da);
}
function isEdited(y,mo,da){ return !!overrides[keyOf(y,mo,da)]; }
function salaryDay(y,mo){const w=new Date(y,mo-1,5).getDay();return w===6?4:w===0?3:5;}
function sameDay(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();}
function daysIn(y,mo){return new Date(y,mo,0).getDate();}
function cutoffDates(cm){
  const out=[]; let pm=cm-1,py=2026; if(pm===0){pm=12;py=2025;}
  for(let d=26;d<=daysIn(py,pm);d++) out.push({y:py,mo:pm,da:d});
  for(let d=1;d<=25;d++) out.push({y:2026,mo:cm,da:d});
  return out;
}

/* ============ RENDER ============ */
const TODAY=new Date();
const wrap=document.getElementById('cutWrap');
function render(){
  wrap.innerHTML='';
  CUTOFFS.forEach(cm=>{
    const dates=cutoffDates(cm), color=cutoffColor(cm);
    let counts={duty:0,ot:0,bupan:0,rest:0}, grid='', curMo=null;
    dates.forEach(({y,mo,da})=>{
      if(mo!==curMo){
        grid+=`<div class="mdiv">${MFULL[mo]} ${y}</div>`;
        const lead=new Date(y,mo-1,da).getDay();
        for(let i=0;i<lead;i++) grid+='<div class="cell empty"></div>';
        curMo=mo;
      }
      const t=dayType(y,mo,da); counts[t]++;
      const cls=['cell','t-'+t];
      if(da===salaryDay(y,mo)) cls.push('is-salary');
      if(sameDay(new Date(y,mo-1,da),TODAY)) cls.push('is-today');
      if(isEdited(y,mo,da)) cls.push('is-edited');
      grid+=`<div class="${cls.join(' ')}" data-y="${y}" data-mo="${mo}" data-da="${da}">${da}</div>`;
    });
    const f=dates[0], l=dates[dates.length-1];
    wrap.insertAdjacentHTML('beforeend',`
      <div class="cutbox" style="--cut:${color}">
        <div class="cb-head">
          <div class="cb-title"><span class="dot"></span>${MFULL[cm]} cutoff</div>
          <div class="cb-range">${MNAME[f.mo]} ${f.da} – ${MNAME[l.mo]} ${l.da}, 2026</div>
        </div>
        <div class="cb-body"><div class="dow">${DOW.map(d=>`<span>${d}</span>`).join('')}</div><div class="days">${grid}</div></div>
        <div class="cb-foot">
          <div class="stat duty"><div class="v">${counts.duty}</div><div class="kk">Duty</div></div>
          <div class="stat ot"><div class="v">${counts.ot}</div><div class="kk">OT</div></div>
          <div class="stat bupan"><div class="v">${counts.bupan}</div><div class="kk">Bupan</div></div>
          <div class="stat rest"><div class="v">${counts.rest}</div><div class="kk">Rest</div></div>
        </div>
      </div>`);
  });
}
render();

/* ============ TAP TO EDIT ============ */
const overlay=document.getElementById('overlay');
const sheetTitle=document.getElementById('sheetTitle');
const sheetMeta=document.getElementById('sheetMeta');
let editing=null;

wrap.addEventListener('click',e=>{
  const cell=e.target.closest('.cell:not(.empty)');
  if(!cell) return;
  editing={y:+cell.dataset.y, mo:+cell.dataset.mo, da:+cell.dataset.da};
  const cur=dayType(editing.y,editing.mo,editing.da);
  const wd=new Date(editing.y,editing.mo-1,editing.da).toLocaleDateString(undefined,{weekday:'long'});
  sheetTitle.textContent=`${MFULL[editing.mo]} ${editing.da}, ${editing.y}`;
  sheetMeta.textContent=`${wd} · currently ${cur.toUpperCase()}${isEdited(editing.y,editing.mo,editing.da)?' (edited)':' (auto)'}`;
  document.querySelectorAll('.opt').forEach(o=>o.classList.toggle('sel',o.dataset.set===cur));
  overlay.classList.add('open');
});
overlay.addEventListener('click',e=>{ if(e.target===overlay) overlay.classList.remove('open'); });

document.querySelectorAll('.opt').forEach(opt=>{
  opt.addEventListener('click',()=>{
    if(!editing) return;
    const k=keyOf(editing.y,editing.mo,editing.da);
    const set=opt.dataset.set;
    if(set==='auto'){ delete overrides[k]; toast('Reset to auto'); }
    else { overrides[k]=set; toast('Set to '+set.toUpperCase()); }
    saveOverrides();
    overlay.classList.remove('open');
    render();
  });
});

/* ============ TOAST ============ */
let toastT;
const toastEl=document.getElementById('toast');
function toast(msg){
  toastEl.textContent=msg; toastEl.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>toastEl.classList.remove('show'),1600);
}

/* ============ EXPORT ICS ============ */
const LABEL={duty:['🔵 Duty','On duty (2-2 rotation)'],ot:['🔴 Overtime','Overtime day'],
             bupan:['🟢 Bupan','Bupan day'],rest:['⚪ Rest','Rest day (2-2 rotation)']};
function pad(n){return String(n).padStart(2,'0');}
function fmt(y,mo,da){return `${y}${pad(mo)}${pad(da)}`;}
function nextDay(y,mo,da){const d=new Date(y,mo-1,da+1);return fmt(d.getFullYear(),d.getMonth()+1,d.getDate());}

document.getElementById('exportBtn').addEventListener('click',()=>{
  const L=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//BoyJohn//2-2 Work Schedule//EN',
    'CALSCALE:GREGORIAN','METHOD:PUBLISH','X-WR-CALNAME:2-2 Work Schedule','X-WR-TIMEZONE:Asia/Manila'];
  CUTOFFS.forEach(cm=>{
    cutoffDates(cm).forEach(({y,mo,da})=>{
      // de-dupe: only emit a day once (June cutoff's 1-25 won't repeat in July's, but opening halves are unique)
      const t=dayType(y,mo,da), [s,desc]=LABEL[t];
      L.push('BEGIN:VEVENT',`UID:day-${fmt(y,mo,da)}@boyjohn-schedule`,'DTSTAMP:20260617T000000Z',
        `DTSTART;VALUE=DATE:${fmt(y,mo,da)}`,`DTEND;VALUE=DATE:${nextDay(y,mo,da)}`,
        `SUMMARY:${s}`,`DESCRIPTION:${desc}`,'TRANSP:TRANSPARENT','END:VEVENT');
      if(da===salaryDay(y,mo)){
        L.push('BEGIN:VEVENT',`UID:salary-${fmt(y,mo,da)}@boyjohn-schedule`,'DTSTAMP:20260617T000000Z',
          `DTSTART;VALUE=DATE:${fmt(y,mo,da)}`,`DTEND;VALUE=DATE:${nextDay(y,mo,da)}`,
          'SUMMARY:💵 Salary','DESCRIPTION:Payday (5th rule)','TRANSP:TRANSPARENT','END:VEVENT');
      }
    });
  });
  L.push('END:VCALENDAR');
  const blob=new Blob([L.join('\r\n')+'\r\n'],{type:'text/calendar'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download='work-schedule.ics'; document.body.appendChild(a); a.click();
  a.remove(); setTimeout(()=>URL.revokeObjectURL(url),1000);
  toast('Saved work-schedule.ics — open it to import');
});

/* ============ TODAY SCROLL ============ */
document.getElementById('todayBtn').addEventListener('click',()=>{
  const el=document.querySelector('.is-today');
  if(el) el.scrollIntoView({behavior:'smooth',block:'center'});
  else toast('Today is outside the schedule range');
});
</script>
</body>
</html>
